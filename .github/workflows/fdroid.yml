name: F-Droid Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 3.0.0)'
        required: true
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  fdroid-prepare:
    name: Prepare F-Droid Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Get version info
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          
          # Get versionCode from build.gradle.kts
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Validate F-Droid metadata
        run: |
          fastlane validate_fdroid_metadata

      - name: Check changelog exists
        run: |
          CHANGELOG="fastlane/metadata/android/en-US/changelogs/${{ steps.version.outputs.VERSION_CODE }}.txt"
          if [ ! -f "$CHANGELOG" ]; then
            echo "::error::Changelog not found: $CHANGELOG"
            echo "Please create a changelog for versionCode ${{ steps.version.outputs.VERSION_CODE }}"
            exit 1
          fi
          echo "✓ Changelog found: $CHANGELOG"

      - name: Verify F-Droid build
        run: |
          fastlane fdroid_build

      - name: Generate F-Droid metadata summary
        run: |
          echo "## F-Droid Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Code**: ${{ steps.version.outputs.VERSION_CODE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changelog**: fastlane/metadata/android/en-US/changelogs/${{ steps.version.outputs.VERSION_CODE }}.txt" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Metadata Structure" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tree fastlane/metadata/android/en-US/ 2>/dev/null || find fastlane/metadata/android/en-US/ -type f >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fdroid-apk-v${{ steps.version.outputs.VERSION }}
          path: app/build/outputs/apk/release/app-release.apk

  # This job verifies that the app meets F-Droid inclusion criteria
  fdroid-compliance:
    name: F-Droid Compliance Check
    runs-on: ubuntu-latest
    needs: fdroid-prepare
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for proprietary dependencies
        run: |
          echo "Checking for non-free dependencies..."
          
          # Check build.gradle.kts for known non-free dependencies
          # These would need to be handled with build flavors for F-Droid
          
          PROPRIETARY_PATTERNS=(
            "play-services"
            "firebase"
            "crashlytics"
            "analytics"
            "admob"
            "billing"
          )
          
          FOUND_ANY=false
          for pattern in "${PROPRIETARY_PATTERNS[@]}"; do
            if grep -r "$pattern" app/build.gradle.kts gradle/libs.versions.toml 2>/dev/null; then
              echo "⚠ Found potential proprietary dependency: $pattern"
              FOUND_ANY=true
            fi
          done
          
          if [ "$FOUND_ANY" = true ]; then
            echo "::warning::Some dependencies may need to be excluded for F-Droid."
            echo "Consider creating a 'fdroid' product flavor that excludes these."
          else
            echo "✓ No obvious proprietary dependencies found"
          fi

      - name: Check metadata files
        run: |
          META_DIR="fastlane/metadata/android/en-US"
          
          echo "Checking metadata files..."
          
          # Check required files
          for file in title.txt short_description.txt full_description.txt; do
            if [ -f "$META_DIR/$file" ]; then
              SIZE=$(stat -c%s "$META_DIR/$file")
              echo "✓ $file ($SIZE bytes)"
            else
              echo "::error::Missing required file: $file"
              exit 1
            fi
          done

      - name: Verify license
        run: |
          if [ -f "LICENSE" ]; then
            echo "✓ LICENSE file found"
            head -5 LICENSE
          else
            echo "::error::LICENSE file not found"
            exit 1
          fi
