name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 3.1.1)'
        required: true
        default: '3.1.1'

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$ENCODED_KEYSTORE" | base64 -d > app/keystore.jks

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Extract version code
        id: get_version_code
        run: |
          VERSION_CODE=$(grep "versionCode" app/build.gradle.kts | grep -o '[0-9]\+' | head -1)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assemblePlayRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Build Release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundlePlayRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Rename artifacts
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          VERSION_CODE="${{ steps.get_version_code.outputs.VERSION_CODE }}"

          mv app/build/outputs/apk/play/release/app-play-release.apk \
             "app/build/outputs/apk/play/release/Azkary-v${VERSION}-${VERSION_CODE}-release.apk"

          mv app/build/outputs/bundle/playRelease/app-play-release.aab \
             "app/build/outputs/bundle/playRelease/Azkary-v${VERSION}-${VERSION_CODE}-release.aab"

      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          VERSION_CODE="${{ steps.get_version_code.outputs.VERSION_CODE }}"

          APK_PATH="app/build/outputs/apk/play/release/Azkary-v${VERSION}-${VERSION_CODE}-release.apk"
          AAB_PATH="app/build/outputs/bundle/playRelease/Azkary-v${VERSION}-${VERSION_CODE}-release.aab"

          APK_SHA=$(sha256sum "$APK_PATH" | cut -d' ' -f1)
          AAB_SHA=$(sha256sum "$AAB_PATH" | cut -d' ' -f1)

          # Extract this version's section from CHANGELOG.md
          CHANGELOG_SECTION=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)

          {
            echo "## What's New in v${VERSION}"
            echo ""
            if [ -n "$CHANGELOG_SECTION" ]; then
              echo "$CHANGELOG_SECTION"
            else
              echo "_No changelog entry found for this version. See commit history for details._"
            fi
            echo ""
            echo "---"
            echo ""
            echo "### Install"
            echo ""
            echo "1. Download the **APK** file below"
            echo "2. On your device go to **Settings → Security** and enable _Install from unknown sources_"
            echo "3. Open the downloaded APK and tap **Install**"
            echo ""
            echo "> Already using Azkary? Install over the existing app — your data and settings are preserved."
            echo ""
            echo "---"
            echo ""
            echo "### Downloads"
            echo ""
            echo "| File | Description |"
            echo "|------|-------------|"
            echo "| \`Azkary-v${VERSION}-${VERSION_CODE}-release.apk\` | Direct install on any Android device |"
            echo "| \`Azkary-v${VERSION}-${VERSION_CODE}-release.aab\` | Google Play Store bundle |"
            echo ""
            echo "### Verify (SHA-256 checksums)"
            echo ""
            echo '```'
            echo "APK: ${APK_SHA}"
            echo "AAB: ${AAB_SHA}"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "**Enjoying Azkary?** Leave a ⭐ on GitHub or a review on Google Play — it helps others find the app!"
          } > release_notes.md

      - name: Delete existing release if present
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v${{ steps.get_version.outputs.VERSION }}" --yes --cleanup-tag=false 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Azkary v${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          files: |
            app/build/outputs/apk/play/release/Azkary-v*.apk
            app/build/outputs/bundle/playRelease/Azkary-v*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Azkary-v${{ steps.get_version.outputs.VERSION }}-${{ steps.get_version_code.outputs.VERSION_CODE }}-release-apk
          path: app/build/outputs/apk/play/release/Azkary-v*.apk

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Azkary-v${{ steps.get_version.outputs.VERSION }}-${{ steps.get_version_code.outputs.VERSION_CODE }}-release-aab
          path: app/build/outputs/bundle/playRelease/Azkary-v*.aab

      - name: Clean up keystore
        if: always()
        run: rm -f app/keystore.jks
