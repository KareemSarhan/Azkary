name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 3.0.0)'
        required: true
        default: '3.0.0'

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Build Release AAB
        run: ./gradlew bundleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Extract version code
        id: get_version_code
        run: |
          VERSION_CODE=$(grep "versionCode" app/build.gradle.kts | grep -o '[0-9]\+' | head -1)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Rename artifacts
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          VERSION_CODE="${{ steps.get_version_code.outputs.VERSION_CODE }}"
          
          # The sign action appends -signed to the filename
          mv app/build/outputs/apk/release/*-signed.apk \
             "app/build/outputs/apk/release/Azkary-v${VERSION}-${VERSION_CODE}-release.apk"
          
          mv app/build/outputs/bundle/release/*-signed.aab \
             "app/build/outputs/bundle/release/Azkary-v${VERSION}-${VERSION_CODE}-release.aab"

      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          VERSION_CODE="${{ steps.get_version_code.outputs.VERSION_CODE }}"
          
          # Get changes since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges ${LAST_TAG}..HEAD)
          fi
          
          # Create release notes
          echo "## What's New in v$VERSION ($VERSION_CODE)" > release_notes.md
          echo "" >> release_notes.md
          echo "### Changes" >> release_notes.md
          echo "$CHANGES" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Downloads" >> release_notes.md
          echo "- **APK**: For direct installation on Android devices" >> release_notes.md
          echo "- **AAB**: For Google Play Store upload" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Installation" >> release_notes.md
          echo '1. Download the APK file' >> release_notes.md
          echo '2. Enable "Install from Unknown Sources" in Settings' >> release_notes.md
          echo '3. Open the downloaded APK and install' >> release_notes.md
          echo "" >> release_notes.md
          echo "### Checksums" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          echo "APK: $(sha256sum "app/build/outputs/apk/release/Azkary-v${VERSION}-${VERSION_CODE}-release.apk" | cut -d' ' -f1)" >> release_notes.md
          echo "AAB: $(sha256sum "app/build/outputs/bundle/release/Azkary-v${VERSION}-${VERSION_CODE}-release.aab" | cut -d' ' -f1)" >> release_notes.md
          echo "\`\`\`" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Azkary v${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          files: |
            app/build/outputs/apk/release/Azkary-v*.apk
            app/build/outputs/bundle/release/Azkary-v*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Azkary-v${{ steps.get_version.outputs.VERSION }}-${{ steps.get_version_code.outputs.VERSION_CODE }}-release-apk
          path: app/build/outputs/apk/release/Azkary-v*.apk

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Azkary-v${{ steps.get_version.outputs.VERSION }}-${{ steps.get_version_code.outputs.VERSION_CODE }}-release-aab
          path: app/build/outputs/bundle/release/Azkary-v*.aab
