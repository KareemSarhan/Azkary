name: Bug Report
description: Report a bug or issue with the app
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
  
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: Describe what happened...
    validations:
      required: true
  
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the issue
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true
  
  - type: dropdown
    id: app_version
    attributes:
      label: App Version
      description: What version of Azkary are you using?
      options:
        - "3.0.x"
        - "2.x"
        - "Other"
    validations:
      required: true
  
  - type: dropdown
    id: android_version
    attributes:
      label: Android Version
      description: What Android version are you running?
      options:
        - "Android 15"
        - "Android 14"
        - "Android 13"
        - "Android 12 or lower"
        - "Unknown"
    validations:
      required: true
  
  - type: input
    id: device
    attributes:
      label: Device Model
      description: What device are you using? (e.g., Samsung Galaxy S24)
      placeholder: Device model
  
  - type: dropdown
    id: language
    attributes:
      label: Language
      description: What language is the app set to?
      options:
        - English
        - Arabic
        - Other
  
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem
  
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided all the information requested above
          required: true
